[tox]
envlist = py311, py312, lint, type
isolated_build = true
skip_missing_interpreters = true

[testenv]
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs:tests} --cov=src --cov-report=term-missing

[testenv:lint]
deps =
    black
    ruff
    isort
commands =
    black --check src tests
    ruff check src tests
    isort --check-only src tests

[testenv:type]
deps =
    mypy
    types-requests
commands =
    mypy src

[testenv:format]
deps =
    black
    isort
commands =
    black src tests
    isort src tests
